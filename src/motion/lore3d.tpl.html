<!doctype html><html><head><meta charset="utf8">
<style>html,body{margin:0;background:#000;overflow:hidden}#c{display:block}</style>
<script type="importmap">{ "imports": { "three":"https://unpkg.com/three@0.160.0/build/three.module.js" } }</script>
</head><body><canvas id="c"></canvas>
<script type="module">
import * as THREE from "three";
// LORECRAFT 3D — REFERENCE-MATCHED MULTIPLANE (GoT "Histories & Lore" diorama parallax).
// Each painting is cut by its depth map into K planes stacked at WIDELY-SEPARATED world-Z,
// so near planes parallax MUCH faster than far ones. A craning camera (big lateral + vertical
// arc, modest dolly) makes the layers slide past each other at clearly different rates =
// "multiple different parallax levels overlaid". Per-layer depth-of-field blur (sharp on the
// focus plane, soft near + far) sells the 3D depth like the reference.
const W0 = 1920, H0 = 1080;
const cnv = document.getElementById("c");
const renderer = new THREE.WebGLRenderer({ canvas: cnv, antialias: true });
renderer.setClearColor(0x000000, 1);
const scene = new THREE.Scene();
let META = null, SCENES = [], pending = 0, CAM = null, VW = W0, VH = H0;
const need = () => pending++;
const fin = () => { pending--; if (pending <= 0 && META) window.__ready = true; };
const texL = new THREE.TextureLoader();
function loadTex(url) { need(); const t = texL.load(url, fin, undefined, fin); t.colorSpace = THREE.NoColorSpace; t.minFilter = THREE.LinearFilter; t.magFilter = THREE.LinearFilter; t.generateMipmaps = false; return t; }

const VERT = `
uniform sampler2D depth; uniform float uDisp;
varying vec2 vUv; varying float vD;
void main(){ vUv = uv; float d = texture2D(depth, uv).r; vD = d; vec3 p = position; p.z += (d - 0.5) * uDisp; gl_Position = projectionMatrix * modelViewMatrix * vec4(p, 1.0); }`;
// FRAG — band-alpha cut + painterly grade + depth haze + cheap 9-tap depth-of-field blur.
const FRAG = `
precision highp float;
uniform sampler2D map; uniform sampler2D depth;
uniform float uOpacity, uHaze, uBandLo, uBandHi, uFeather, uBack, uTop, uBlur;
uniform vec3 uFog;
varying vec2 vUv; varying float vD;
vec3 blurCol(vec2 uv, float b){
  if (b < 0.0006) return texture2D(map, uv).rgb;
  vec3 s = texture2D(map, uv).rgb * 0.28;
  s += texture2D(map, uv + vec2( b, 0.0)).rgb * 0.12;
  s += texture2D(map, uv + vec2(-b, 0.0)).rgb * 0.12;
  s += texture2D(map, uv + vec2(0.0,  b)).rgb * 0.12;
  s += texture2D(map, uv + vec2(0.0, -b)).rgb * 0.12;
  s += texture2D(map, uv + vec2( b,  b)).rgb * 0.06;
  s += texture2D(map, uv + vec2( b, -b)).rgb * 0.06;
  s += texture2D(map, uv + vec2(-b,  b)).rgb * 0.06;
  s += texture2D(map, uv + vec2(-b, -b)).rgb * 0.06;
  return s;
}
void main(){
  vec4 t = texture2D(map, vUv);
  vec3 c = blurCol(vUv, uBlur);
  c = (c - 0.5) * 1.07 + 0.5; c *= vec3(1.05, 1.0, 0.93);
  float d = texture2D(depth, vUv).r;
  float a;
  if (uBack > 0.5) { a = 1.0; }
  else {
    float lo = smoothstep(uBandLo, uBandLo + uFeather, d);
    float hi = (uTop > 0.5) ? 1.0 : (1.0 - smoothstep(uBandHi - uFeather, uBandHi, d));
    a = lo * hi;
  }
  c = mix(c, uFog, clamp((1.0 - d) * uHaze, 0.0, 1.0));
  if (a < 0.004) discard;
  gl_FragColor = vec4(c, t.a * a * uOpacity);
}`;

const D2R = Math.PI / 180;
function buildScene(s, si) {
  const K = META.layers, fov = META.fov, halfH = Math.tan((fov * 0.5) * D2R) * META.oversize;
  const grp = { layers: [], dur: s.dur, idx: si };
  const map = loadTex(s.img), depth = loadTex(s.depth);
  for (let k = 0; k < K; k++) {
    const back = k === 0, top = k === K - 1;
    const z = -META.back + k * META.step;                 // k=0 farthest … k=K-1 nearest (WIDE spread)
    const fillDist = META.camEnd - z;
    const h = 2 * fillDist * halfH, w = h * (16 / 9);
    const n = K > 2 ? (k - 1) / (K - 2) : 1;
    const center = 0.28 + n * 0.62, hw = 0.13;
    // depth-of-field: sharp at META.focus, blur grows with |bandDepth − focus|
    const bd = back ? 0.12 : center;
    const blur = Math.min(META.dofMax, Math.abs(bd - META.focus) * META.dof);
    const geo = new THREE.PlaneGeometry(w, h, 160, 90);
    const mat = new THREE.ShaderMaterial({
      uniforms: {
        map: { value: map }, depth: { value: depth },
        uDisp: { value: back ? META.disp * 0.4 : META.disp },
        uOpacity: { value: 0 }, uHaze: { value: META.haze * (back ? 1.0 : 0.5) },
        uBandLo: { value: center - hw }, uBandHi: { value: center + hw }, uFeather: { value: 0.06 },
        uBack: { value: back ? 1 : 0 }, uTop: { value: top ? 1 : 0 }, uBlur: { value: blur },
        uFog: { value: new THREE.Color(META.fog) },
      },
      vertexShader: VERT, fragmentShader: FRAG, transparent: true, depthTest: false, depthWrite: false,
    });
    const m = new THREE.Mesh(geo, mat); m.position.z = z; m.frustumCulled = false; m.visible = false;
    m.renderOrder = si * (K + 2) + k; scene.add(m); grp.layers.push(m);
  }
  return grp;
}

function resize() {
  VW = window.innerWidth || W0; VH = window.innerHeight || H0;
  renderer.setSize(VW, VH, false); renderer.setPixelRatio(1);
  if (CAM) { CAM.aspect = VW / VH; CAM.updateProjectionMatrix(); }
}
window.addEventListener("resize", resize);

fetch("lore3d_meta.json").then((r) => r.json()).then((m) => {
  META = m;
  CAM = new THREE.PerspectiveCamera(m.fov, (window.innerWidth || W0) / (window.innerHeight || H0), 0.1, 300);
  resize();
  SCENES = m.scenes.map(buildScene); window.__dur = m.total;
  if (pending <= 0) window.__ready = true;
});

const ease = (x) => (x < 0.5 ? 4 * x * x * x : 1 - Math.pow(-2 * x + 2, 3) / 2);
const smooth = (a, b, x) => { x = Math.min(1, Math.max(0, (x - a) / (b - a))); return x * x * (3 - 2 * x); };

window.__frame = (tn) => {
  if (!META || !CAM) return;
  const T = tn * META.total, cf = META.cross;
  let acc = 0, idx = 0, lt = 0;
  for (let i = 0; i < META.scenes.length; i++) { const d = SCENES[i].dur; if (T < acc + d || i === META.scenes.length - 1) { idx = i; lt = (T - acc) / d; break; } acc += d; }
  lt = Math.min(1, Math.max(0, lt));
  for (let i = 0; i < SCENES.length; i++) {
    let st = 0; for (let k = 0; k < i; k++) st += SCENES[k].dur; const en = st + SCENES[i].dur;
    const fadeIn = i === 0 ? 1 : smooth(st - cf, st + cf, T);
    const fadeOut = i === SCENES.length - 1 ? 1 : (1 - smooth(en - cf, en + cf, T));
    const o = Math.min(fadeIn, fadeOut);
    for (const m of SCENES[i].layers) { m.material.uniforms.uOpacity.value = o; m.visible = o > 0.002; }
  }
  // CRANE CAMERA — big lateral + vertical arc (the multi-rate parallax driver) + modest dolly.
  const e = ease(lt), dir = idx % 2 === 0 ? 1 : -1;
  const C = META.camStart + (META.camEnd - META.camStart) * e;          // dolly (modest)
  const x = dir * META.camAmpX * (e - 0.5) + Math.sin(T * 0.1) * 0.04;   // lateral sweep
  const y = META.camStartY + (META.camEndY - META.camStartY) * e;       // crane down
  CAM.position.set(x, y, C);
  CAM.lookAt(x * (1 - META.converge), y * (1 - META.converge), -100);   // mostly straight; slight convergence
  renderer.render(scene, CAM);
};
window.__settle = () => new Promise((r) => requestAnimationFrame(() => requestAnimationFrame(r)));
const kick = setInterval(() => { if (window.__ready) { clearInterval(kick); window.__frame(0); } }, 60);
</script></body></html>
